version: "3.9"

services:

  backend:
    build:
      context: ./backend
    container_name: skillbridge-backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: skillbridge-frontend
    ports:
      - "3001:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: skillbridge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: skillbridge
      POSTGRES_PASSWORD: skillbridge
      POSTGRES_DB: skillbridge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: skillbridge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  nginx:
    image: nginx:alpine
    container_name: skillbridge-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
